name: Release
run-name: release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - closed

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Gather project metadata
    runs-on: ubuntu-latest
    outputs:
      cargo-pkg-name: ${{ steps.cargo-metadata.outputs.CARGO_PKG_NAME }}
      cargo-pkg-version: ${{ steps.cargo-metadata.outputs.CARGO_PKG_VERSION }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Gather project metadata
        id: cargo-metadata
        run: |
          PROJECT_NAME=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[].name')
          PROJECT_VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[].version')
          
          echo "Project name: $PROJECT_NAME"
          echo "Project version: $PROJECT_VERSION"
          
          echo "CARGO_PKG_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "CARGO_PKG_VERSION=$PROJECT_VERSION" >> $GITHUB_OUTPUT

